services:
  carla:
    image: carlasim/carla:0.9.16
    container_name: carlasim
    runtime: nvidia
    network_mode: 'host'
    shm_size: '2GB'
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    # Using host network, so CARLA_PORT (2000) is exposed directly on the node
    command: /bin/bash CarlaUE4.sh -opengl -RenderOffScreen -nosound
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: simulator
    network_mode: 'host'
    environment:
      - CARLA_HOST=localhost
      - CARLA_PORT=${CARLA_PORT:-2000}
      - TM_PORT=${TM_PORT:-5000}
      - PORT=${SIMULATOR_PORT:-8502}
      - LOG_DIR=/app/logs
    volumes:
      - ./logs/simulator:/app/logs
    depends_on:
      carla:
        condition: service_started
    restart: unless-stopped

  snapshot:
    build:
      context: ./snapshot
      dockerfile: Dockerfile
    container_name: snapshot
    network_mode: 'host'
    environment:
      - CARLA_HOST=localhost
      - CARLA_PORT=${CARLA_PORT:-2000}
      - PORT=${SNAPSHOT_PORT:-8000}
      - LOG_DIR=/app/logs
    volumes:
      - ./logs/snapshot:/app/logs
    depends_on:
      - carla
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agent
    network_mode: 'host'
    environment:
      - PORT=${AGENT_PORT:-8500}
      - NODE_IP=${NEXT_PUBLIC_NODE_IP}
      - SIMULATOR_PORT=${SIMULATOR_PORT:-8502}
      - LOG_DIR=/app/logs
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    volumes:
      - ./logs/agent:/app/logs
    depends_on:
      simulator:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_NODE_IP=${NEXT_PUBLIC_NODE_IP}
        - NEXT_PUBLIC_API_PORT=${AGENT_PORT:-8500}
        - NEXT_PUBLIC_AGENT_PORT=${AGENT_PORT:-8500}
        - NEXT_PUBLIC_SNAPSHOT_PORT=${SNAPSHOT_PORT:-8000}
    container_name: frontend
    network_mode: 'host'
    environment:
      - NEXT_PUBLIC_NODE_IP=${NEXT_PUBLIC_NODE_IP}
      - NEXT_PUBLIC_API_PORT=${AGENT_PORT:-8500}
      - NEXT_PUBLIC_SNAPSHOT_PORT=${SNAPSHOT_PORT:-8000}
    depends_on:
      agent:
        condition: service_started
    restart: unless-stopped
